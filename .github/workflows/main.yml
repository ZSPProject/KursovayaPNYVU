name: test-and-coverage

on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Prepare coverage output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\TestResults" | Out-Null

      - name: Test + coverage (coverlet)
        shell: pwsh
        run: |
          dotnet test ./Kursovaya/Kursovaya.Tests/Kursovaya.Tests.csproj `
            -c Release

      - name: Test + coverage (opencover)
        shell: pwsh
        run: |
          dotnet test ./Kursovaya/Kursovaya.Tests/Kursovaya.Tests.csproj `
            -c Release `
            /p:CollectCoverage=true `
            /p:CoverletOutputFormat=opencover `
            /p:CoverletOutput="$env:GITHUB_WORKSPACE\TestResults\" `
            /p:Threshold=0

      - name: List coverage outputs
        shell: pwsh
        run: |
          $path = Join-Path $env:GITHUB_WORKSPACE 'TestResults'
          Write-Host "coverage path: $path"
          Get-ChildItem -Recurse -Force $path | Select-Object FullName

      - name: Install reportgenerator
        shell: pwsh
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.2.0
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"

      - name: ReportGenerator (HTML)
        shell: pwsh
        run: |
          $root = "$env:GITHUB_WORKSPACE\TestResults"
          reportgenerator `
            -reports:"$root\**\*.opencover.xml" `
            -targetdir:"$root\CoverageReport" `
            -reporttypes:Html

      - name: Show report location
        shell: pwsh
        run: |
          Write-Host "Coverage report: $env:GITHUB_WORKSPACE\TestResults\CoverageReport"
          Get-ChildItem -Recurse -Force "$env:GITHUB_WORKSPACE\TestResults\CoverageReport" | Select-Object -First 20

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ github.workspace }}/TestResults/CoverageReport





